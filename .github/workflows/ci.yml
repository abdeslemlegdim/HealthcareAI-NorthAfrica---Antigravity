name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-minimal.txt
          pip install pytest requests

      - name: Syntax compile
        run: |
          python -m py_compile main.py
          python -m py_compile src/rag_system/api.py src/rag_system/rag.py src/rag_system/llm_generator.py
          python -m py_compile src/medical_imaging/api.py src/vital_signs/api.py

      - name: Run unit tests (non-network)
        run: |
          pytest -q tests -k "not smoke"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
